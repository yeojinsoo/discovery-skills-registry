name: Release Skill

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          SKILL_NAME=${TAG%-v*}
          VERSION=${TAG##*-v}
          echo "skill_name=${SKILL_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Validate skill directory exists
        run: |
          if [ ! -d "skills/${{ steps.parse.outputs.skill_name }}" ]; then
            echo "::error::Skill directory 'skills/${{ steps.parse.outputs.skill_name }}' not found"
            exit 1
          fi

      - name: Package skill
        run: |
          tar -czf "${{ steps.parse.outputs.skill_name }}-${{ steps.parse.outputs.version }}.tar.gz" \
            --exclude='CHANGELOG.md' \
            -C "skills/${{ steps.parse.outputs.skill_name }}" .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ steps.parse.outputs.skill_name }}-${{ steps.parse.outputs.version }}.tar.gz"
          name: "${{ steps.parse.outputs.tag }}"
          generate_release_notes: true
